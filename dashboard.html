<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideeri — Dashboard</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: #f0f4f8; color: #2d3748; font-size: 14px; }
.app    { display: flex; height: 100vh; overflow: hidden; }
.sidebar{ width: 230px; background: #1a202c; color: #e2e8f0; display: flex;
          flex-direction: column; flex-shrink: 0; }
.main   { flex: 1; overflow-y: auto; }
.sb-head { padding: 20px 18px 14px; font-size: 22px; font-weight: 800; color: #fff;
           border-bottom: 1px solid #2d3748; letter-spacing: -.5px; }
.sb-head em { color: #f6993f; font-style: normal; }
.sb-section { padding: 12px 18px 4px; font-size: 10px; text-transform: uppercase;
              letter-spacing: .08em; color: #4a5568; }
.zone-item { padding: 10px 18px; cursor: pointer; transition: background .12s;
             border-left: 3px solid transparent; }
.zone-item:hover { background: #2d3748; }
.zone-item.active { background: #2b4c7e; border-left-color: #63b3ed; }
.zone-item .cp    { font-weight: 600; font-size: 13px; }
.zone-item .zname { font-size: 11px; color: #718096; margin-top: 2px; }
.zone-item .zmeta { font-size: 10px; color: #4a5568; margin-top: 1px; }
.zone-item.active .zname { color: #90cdf4; }
.zone-item.active .zmeta { color: #4a90d9; }
.sb-add { margin: 12px 16px 16px; padding: 8px 12px; background: #2d3748;
          border: 1px dashed #4a5568; border-radius: 6px; color: #718096;
          font-size: 12px; cursor: pointer; text-align: center; transition: background .12s; }
.sb-add:hover { background: #3d4f63; color: #e2e8f0; }
.page-head { padding: 26px 30px 0; display: flex; justify-content: space-between; align-items: flex-start; }
.page-title { font-size: 24px; font-weight: 700; line-height: 1.2; }
.page-sub   { font-size: 12px; color: #718096; margin-top: 4px; }
.btn { padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer;
       font-size: 13px; font-weight: 600; transition: background .15s; }
.btn-primary { background: #3182ce; color: #fff; }
.btn-primary:hover { background: #2b6cb0; }
.btn-ghost { background: #e2e8f0; color: #4a5568; }
.btn-ghost:hover { background: #cbd5e0; }
.content { padding: 22px 30px 40px; }
.cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 22px; }
.card { background: #fff; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.card-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #718096; margin-bottom: 8px; }
.card-val { font-size: 30px; font-weight: 700; line-height: 1; color: #1a202c; }
.card-sub { font-size: 11px; color: #a0aec0; margin-top: 6px; }
.card-sub strong { color: #718096; }
.grid2 { display: grid; grid-template-columns: 200px 1fr; gap: 14px; margin-bottom: 14px; }
.panel { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.p-head { padding: 14px 20px; border-bottom: 1px solid #edf2f7;
          display: flex; justify-content: space-between; align-items: center; }
.p-title { font-size: 13px; font-weight: 600; color: #2d3748; }
.p-body  { padding: 16px 20px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-lbl  { font-size: 12px; color: #4a5568; width: 90px; }
.bar-wrap { flex: 1; background: #edf2f7; border-radius: 99px; height: 7px; overflow: hidden; }
.bar-fill { height: 7px; border-radius: 99px; transition: width .6s ease; }
.bar-pct  { font-size: 12px; font-weight: 700; width: 36px; text-align: right; color: #2d3748; }
.c-lbc  { background: #ed8936; }
.c-sl   { background: #3182ce; }
.c-both { background: #38a169; }
.pc-item { display: flex; justify-content: space-between; align-items: center;
           padding: 8px 0; border-bottom: 1px solid #f7fafc; font-size: 12px; }
.pc-item:last-child { border: none; }
.pc-agency { color: #4a5568; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.down { color: #38a169; font-weight: 700; }
.up   { color: #e53e3e; font-weight: 700; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 9px 14px; text-align: left; font-size: 10px; text-transform: uppercase;
     letter-spacing: .05em; color: #718096; background: #f7fafc;
     border-bottom: 1px solid #edf2f7; cursor: pointer; user-select: none; }
th:hover { color: #2d3748; }
td { padding: 10px 14px; border-bottom: 1px solid #f7fafc; vertical-align: middle; }
tr:last-child td { border: none; }
tr:hover td { background: #fafbfc; cursor: pointer; }
.ent-name { color: #3182ce; font-weight: 500; }
.ent-name:hover { text-decoration: underline; }
.rank { display: inline-flex; align-items: center; justify-content: center;
        width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: 700; }
.rank-1 { background: #fef3c7; color: #92400e; border: 1.5px solid #f6d860; }
.rank-2 { background: #f1f5f9; color: #475569; border: 1.5px solid #cbd5e0; }
.rank-3 { background: #fce8e0; color: #9a3412; border: 1.5px solid #f5bba3; }
.rank-n { background: #f7fafc; color: #a0aec0; border: 1.5px solid #e2e8f0; font-size: 10px; }
.pdm-wrap { display: flex; align-items: center; gap: 8px; min-width: 140px; }
.pdm-bg   { flex: 1; height: 6px; background: #edf2f7; border-radius: 3px; overflow: hidden; }
.pdm-fill { height: 6px; border-radius: 3px; }
.pdm-pct  { font-size: 12px; font-weight: 700; min-width: 34px; text-align: right; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.b-lbc  { background: #fef3c7; color: #92400e; }
.b-sl   { background: #dbeafe; color: #1e40af; }
.b-both { background: #d1fae5; color: #065f46; }
.tag-part { font-size: 11px; color: #805ad5; background: #faf5ff; padding: 1px 6px; border-radius: 4px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
           z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 14px; width: 540px; max-height: 85vh;
         display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.m-head { padding: 20px 24px; border-bottom: 1px solid #edf2f7;
          display: flex; justify-content: space-between; align-items: center; }
.m-title { font-size: 16px; font-weight: 700; }
.m-close { background: none; border: none; cursor: pointer; font-size: 24px; color: #a0aec0; line-height: 1; }
.m-close:hover { color: #4a5568; }
.m-body { padding: 24px; flex: 1; overflow-y: auto; }
.m-foot { padding: 14px 24px; border-top: 1px solid #edf2f7; display: flex; justify-content: flex-end; gap: 8px; }
.form-row { margin-bottom: 16px; }
.form-row label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
.form-row input, .form-row select { width: 100%; padding: 9px 12px; border: 1px solid #cbd5e0;
  border-radius: 7px; font-size: 13px; outline: none; color: #2d3748; }
.form-row input:focus, .form-row select:focus { border-color: #3182ce; }
.log-box { background: #1a202c; border-radius: 8px; padding: 14px; font-family: monospace;
           font-size: 11.5px; color: #cbd5e0; height: 280px; overflow-y: auto;
           white-space: pre-wrap; line-height: 1.6; }
.l-ok   { color: #68d391; }
.l-err  { color: #fc8181; }
.l-warn { color: #f6e05e; }
.empty  { text-align: center; padding: 40px; color: #a0aec0; font-size: 14px; }
.dimmed { color: #cbd5e0; }
.api-err { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: 12px 16px;
           font-size: 13px; margin: 20px; }
.alert-item { padding: 9px 18px; cursor: pointer; border-left: 3px solid #e53e3e;
              background: #1a1010; transition: background .12s; }
.alert-item:hover { background: #2d1515; }
.alert-item .a-cp   { font-weight: 600; font-size: 12px; color: #fc8181; }
.alert-item .a-info { font-size: 10px; color: #fc8181; opacity: .7; margin-top: 2px; }
.sb-section-alert { padding: 12px 18px 4px; font-size: 10px; text-transform: uppercase;
                    letter-spacing: .08em; color: #e53e3e; }
.wait-slider { width: 100%; accent-color: #3182ce; }
.wait-labels { display: flex; justify-content: space-between; font-size: 11px; color: #718096; margin-top: 4px; }
.zrun { font-size: 10px; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.zrun-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.zrun-text { color: #4a5568; }
.zone-item.active .zrun-text { color: #5a9fd4; }
.dot-fresh   { background: #48bb78; }
.dot-stale   { background: #718096; }
.dot-partial { background: #ed8936; }
.dot-error   { background: #fc8181; }
.dot-never   { background: #4a5568; }
.ent-activity { font-size: 11px; color: #a0aec0; margin-top: 5px; }
.ent-cb { width: 15px; height: 15px; cursor: pointer; accent-color: #805ad5; }
.sel-tag { display: inline-flex; align-items: center; gap: 4px; background: #faf5ff;
           color: #553c9a; border: 1px solid #d6bcfa; border-radius: 99px;
           padding: 2px 10px 2px 8px; font-size: 11px; font-weight: 500; margin: 2px 3px; }
.sel-tag .sel-tag-x { cursor: pointer; opacity: .5; font-size: 14px; line-height: 1; }
.sel-tag .sel-tag-x:hover { opacity: 1; }
.mini-bar { position: fixed; bottom: 0; right: 24px; width: 290px; background: #1e2a3a;
            border-radius: 8px 8px 0 0; box-shadow: 0 -4px 24px rgba(0,0,0,.4);
            z-index: 300; cursor: pointer; user-select: none; }
.mini-bar-head { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.mini-bar-info .mini-bar-title { color: #e2e8f0; font-size: 12px; font-weight: 600; }
.mini-bar-info .mini-bar-status { font-size: 11px; color: #718096; margin-top: 2px; }
.mini-bar-btns { display: flex; gap: 2px; flex-shrink: 0; }
.mini-btn { background: none; border: none; color: #718096; cursor: pointer;
            font-size: 20px; line-height: 1; padding: 0 4px; }
.mini-btn:hover { color: #e2e8f0; }
.m-minimize { background: none; border: none; cursor: pointer; font-size: 22px;
              color: #a0aec0; line-height: 1; padding: 0 6px; }
.m-minimize:hover { color: #4a5568; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
.mini-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
            margin-right: 5px; vertical-align: middle; }
.mini-dot.running { background: #ed8936; animation: pulse 1.4s ease-in-out infinite; }
.mini-dot.done    { background: #48bb78; }
.mini-dot.error   { background: #fc8181; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head">Ide<em>eri</em></div>
    <div class="sb-section">Zones</div>
    <div id="zones-list"><div class="empty" style="color:#4a5568;padding:20px;font-size:11px">Chargement…</div></div>
    <div id="alerts-section" style="display:none">
      <div class="sb-section-alert">⚠ Incomplets</div>
      <div id="alerts-list"></div>
    </div>
    <div class="sb-add" onclick="openRunModal()">+ Nouvelle zone</div>
  </aside>
  <div class="main" id="main">
    <div class="empty" style="margin-top:140px;font-size:15px">← Sélectionne une zone</div>
  </div>
</div>

<div class="overlay" id="run-overlay">
  <div class="modal">
    <div class="m-head">
      <span class="m-title">Lancer un run</span>
      <div style="display:flex;align-items:center;gap:2px">
        <button class="m-minimize" id="run-minimize-btn" onclick="minimizeModal('run')" title="Réduire" style="display:none">─</button>
        <button class="m-close" onclick="closeRunModal()">×</button>
      </div>
    </div>
    <div class="m-body">
      <div id="run-form">
        <div class="form-row"><label>Code postal *</label><input type="text" id="r-cp" placeholder="ex : 69700"></div>
        <div class="form-row"><label>Commune *</label><input type="text" id="r-commune" placeholder="ex : Givors"></div>
        <div class="form-row">
          <label>Code SeLoger <span style="color:#a0aec0;font-weight:400">(optionnel — ex : AD08FR28776)</span></label>
          <input type="text" id="r-slcode" placeholder="AD08FRXXXXX">
        </div>
        <div class="form-row">
          <label>Localisation LBC <span style="color:#a0aec0;font-weight:400">(optionnel — coller l'URL LBC depuis le navigateur)</span></label>
          <input type="text" id="r-lbcloc" placeholder="https://www.leboncoin.fr/recherche?… ou Vérin_42410__45.45_4.75_2455">
        </div>
        <div class="form-row"><label>Source</label>
          <select id="r-source">
            <option value="">LBC + SeLoger</option>
            <option value="lbc">LBC uniquement</option>
            <option value="seloger">SeLoger uniquement</option>
          </select>
        </div>
      </div>
      <div id="run-log" style="display:none"><div class="log-box" id="log-content"></div></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeRunModal()">Annuler</button>
      <button class="btn btn-primary" id="run-action-btn" onclick="startRun()">▶ Lancer</button>
    </div>
  </div>
</div>

<div class="overlay" id="retry-overlay">
  <div class="modal">
    <div class="m-head">
      <span class="m-title" id="retry-title">Retry pages manquantes</span>
      <div style="display:flex;align-items:center;gap:2px">
        <button class="m-minimize" id="retry-minimize-btn" onclick="minimizeModal('retry')" title="Réduire" style="display:none">─</button>
        <button class="m-close" onclick="closeRetryModal()">×</button>
      </div>
    </div>
    <div class="m-body">
      <div id="retry-form">
        <div id="retry-info" style="background:#fff3cd;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#856404;line-height:1.6"></div>
        <div class="form-row">
          <label>Wait LBC (ms) — augmenter si HTTP 500 persistant</label>
          <input type="range" class="wait-slider" id="retry-wait" min="6000" max="10000" step="2000" value="8000" oninput="updateWaitLabel()">
          <div class="wait-labels"><span>6 000ms</span><span id="wait-val" style="font-weight:700;color:#2d3748">8 000ms</span><span>10 000ms</span></div>
        </div>
      </div>
      <div id="retry-log" style="display:none"><div class="log-box" id="retry-log-content"></div></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeRetryModal()">Annuler</button>
      <button class="btn btn-ghost" id="retry-accept-btn" onclick="acceptIncomplete()" title="Marquer comme complet sans relancer le scraping" style="color:#718096">✓ Accepter état actuel</button>
      <button class="btn btn-primary" id="retry-action-btn" onclick="startRetry()">↩ Retry</button>
    </div>
  </div>
</div>

<div id="mini-bar" class="mini-bar" style="display:none" onclick="restoreFromMini()">
  <div class="mini-bar-head">
    <div class="mini-bar-info">
      <div class="mini-bar-title" id="mini-title">En cours…</div>
      <div class="mini-bar-status" id="mini-status"><span class="mini-dot running" id="mini-dot"></span>En cours</div>
    </div>
    <div class="mini-bar-btns">
      <button class="mini-btn" onclick="event.stopPropagation();restoreFromMini()" title="Agrandir">⬜</button>
      <button class="mini-btn" onclick="event.stopPropagation();closeMini()" title="Fermer">×</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:5000/api';
let currentCp = '';
let currentCommune = '';
let sortCol = 'mandats';
let sortAsc = false;
let zoneData = null;

let retryCurrentCp = '';
let retryCurrentCommune = '';
let selectedEntities = new Set();

// ── Mini-bar (modal réduit) ──────────────────────────────────────────────────
let _miniTarget = null;

function minimizeModal(target) {
  _miniTarget = target;
  const overlayId = target === 'run' ? 'run-overlay' : 'retry-overlay';
  document.getElementById(overlayId).classList.remove('open');
  const title = target === 'run'
    ? `Run — ${(document.getElementById('r-commune').value||'').trim() || '…'} ${(document.getElementById('r-cp').value||'').trim()}`
    : `Retry — ${retryCurrentCommune} ${retryCurrentCp}`;
  document.getElementById('mini-title').textContent  = title;
  document.getElementById('mini-status').innerHTML   = '<span class="mini-dot running" id="mini-dot"></span>En cours…';
  document.getElementById('mini-bar').style.display  = 'block';
}

function restoreFromMini() {
  if (!_miniTarget) return;
  const overlayId = _miniTarget === 'run' ? 'run-overlay' : 'retry-overlay';
  document.getElementById(overlayId).classList.add('open');
  document.getElementById('mini-bar').style.display = 'none';
}

function closeMini() {
  document.getElementById('mini-bar').style.display = 'none';
  _miniTarget = null;
}

function _miniDone(ok) {
  const dot = document.getElementById('mini-dot');
  if (dot) { dot.className = `mini-dot ${ok ? 'done' : 'error'}`; }
  const txt = document.getElementById('mini-status');
  if (txt) {
    const label = ok ? '✓ Terminé — cliquer pour voir' : '✗ Erreur';
    txt.innerHTML = `<span class="mini-dot ${ok?'done':'error'}"></span>${label}`;
  }
}

// ── Run status ──────────────────────────────────────────────────────────────
function _runStatusHtml(rs) {
  if (!rs || rs.status === 'never')
    return `<div class="zrun"><span class="zrun-dot dot-never"></span><span class="zrun-text">jamais scrapé</span></div>`;
  const dot  = `dot-${rs.status}`;
  const date = rs.date ? new Date(rs.date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '—';
  const lbc  = rs.lbc_pages > 0
    ? (rs.err_lbc?.length ? `LBC ⚠${rs.err_lbc.length}err` : `LBC ✓${rs.lbc_pages}p`) : '';
  const sl   = rs.sl_pages > 0
    ? (rs.err_sl?.length  ? `SL ⚠${rs.err_sl.length}err`   : `SL ✓${rs.sl_pages}p`)   : '';
  const parts = [date, lbc, sl].filter(Boolean).join(' · ');
  return `<div class="zrun"><span class="zrun-dot ${dot}"></span><span class="zrun-text">${parts}</span></div>`;
}

// ── Alertes runs incomplets ───────────────────────────────────────────────────
async function loadAlerts() {
  try {
    const alerts = await apiFetch('/incomplete');
    const section = document.getElementById('alerts-section');
    const list    = document.getElementById('alerts-list');
    if (!alerts.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = alerts.map(a => {
      const parts = [];
      if (a.pages_erreur_lbc?.length) parts.push(`LBC p${a.pages_erreur_lbc.join(',')}`);
      if (a.pages_erreur_sl?.length)  parts.push(`SL p${a.pages_erreur_sl.join(',')}`);
      if (a.statut === 'error')   parts.push('transform crashé');
      if (a.statut === 'running') parts.push('bloqué en running');
      return `<div class="alert-item" onclick="openRetryModal('${a.cp}','${esc(a.commune)}',${JSON.stringify(a).replace(/'/g,"\\'")})">
        <div class="a-cp">${a.cp} ${a.commune}</div>
        <div class="a-info">${parts.join(' · ') || 'incomplet'}</div>
      </div>`;
    }).join('');
  } catch(e) { /* silencieux si l'API n'est pas dispo */ }
}

function openRetryModal(cp, commune, alert) {
  retryCurrentCp = cp; retryCurrentCommune = commune;
  document.getElementById('retry-title').textContent = `Retry — ${commune} ${cp}`;

  const parts = [];
  if (alert.pages_erreur_lbc?.length) parts.push(`Pages LBC manquantes : ${alert.pages_erreur_lbc.join(', ')}`);
  if (alert.pages_erreur_sl?.length)  parts.push(`Pages SeLoger manquantes : ${alert.pages_erreur_sl.join(', ')}`);
  if (alert.statut === 'error')   parts.push('Dernier transform : erreur réseau — relancer le transform');
  if (alert.statut === 'running') parts.push('Run bloqué en "running" — le transform a crashé');
  document.getElementById('retry-info').innerHTML = parts.join('<br>') || 'Pages manquantes détectées';

  document.getElementById('retry-wait').value = '8000';
  document.getElementById('wait-val').textContent = '8 000ms';
  document.getElementById('retry-form').style.display = 'block';
  document.getElementById('retry-log').style.display  = 'none';
  document.getElementById('retry-log-content').innerHTML = '';
  const btn = document.getElementById('retry-action-btn');
  btn.textContent = '↩ Retry'; btn.disabled = false; btn.onclick = startRetry;
  document.getElementById('retry-overlay').classList.add('open');
}

function closeRetryModal() {
  document.getElementById('retry-overlay').classList.remove('open');
  document.getElementById('retry-minimize-btn').style.display = 'none';
}

async function acceptIncomplete() {
  const cp = retryCurrentCp, commune = retryCurrentCommune;
  const btn = document.getElementById('retry-accept-btn');
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await fetch(`${API}/zone/${cp}/accept-incomplete`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({commune})
    });
    const d = await res.json();
    closeRetryModal();
    loadAlerts();
    loadZones();
  } catch(e) {
    btn.disabled = false; btn.textContent = '✓ Accepter état actuel';
  }
}

function updateWaitLabel() {
  const v = document.getElementById('retry-wait').value;
  document.getElementById('wait-val').textContent = parseInt(v).toLocaleString('fr-FR') + 'ms';
}

async function startRetry() {
  const wait = document.getElementById('retry-wait').value;
  document.getElementById('retry-form').style.display = 'none';
  document.getElementById('retry-log').style.display  = 'block';
  document.getElementById('retry-minimize-btn').style.display = 'inline';
  const btn = document.getElementById('retry-action-btn');
  btn.textContent = 'En cours…'; btn.disabled = true;

  const log = document.getElementById('retry-log-content');
  const add = (line) => {
    const d = document.createElement('div');
    d.className = line.includes('✓')||line.includes('OK')?'l-ok'
      :line.includes('✗')||line.includes('ERR')||line.includes('ECHEC')?'l-err'
      :line.includes('⚠')||line.includes('WARN')?'l-warn':'';
    d.textContent = line; log.appendChild(d); log.scrollTop = log.scrollHeight;
  };

  try {
    const resp = await fetch(`${API}/retry/${retryCurrentCp}?wait=${wait}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({commune: retryCurrentCommune})
    });
    const reader = resp.body.getReader(), decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = JSON.parse(line.slice(6));
        if (payload === '__DONE__') {
          add('✓ Retry terminé');
          _miniDone(true);
          btn.textContent = 'Voir les résultats'; btn.disabled = false;
          btn.onclick = () => { closeMini(); closeRetryModal(); selectZone(retryCurrentCp, retryCurrentCommune); loadZones(); loadAlerts(); };
          return;
        }
        add(payload);
      }
    }
  } catch(e) {
    add('✗ Erreur connexion API : ' + e.message);
    _miniDone(false);
    btn.textContent = 'Fermer'; btn.disabled = false; btn.onclick = closeRetryModal;
  }
}

}

function zoneId(cp, commune) {
  return `${cp}-${(commune||'').replace(/[^a-zA-Z0-9]/g,'_')}`;
}

async function selectZone(cp, commune) {
  currentCp = cp; currentCommune = commune;
  document.querySelectorAll('.zone-item').forEach(el => el.classList.remove('active'));
  const zi = document.getElementById('zi-'+zoneId(cp, commune));
  if (zi) zi.classList.add('active');
  document.getElementById('main').innerHTML =
    '<div class="empty" style="margin-top:120px">Chargement…</div>';
  try {
    const params = commune ? `?commune=${encodeURIComponent(commune)}` : '';
    zoneData = await apiFetch('/zone/'+cp+params);
    sortCol = 'mandats'; sortAsc = false;
    selectedEntities = new Set();
    renderZone();
  } catch(e) {
    document.getElementById('main').innerHTML =
      `<div class="api-err">Erreur chargement zone ${cp} : ${e.message}</div>`;
  }
}

// ── Run modal ────────────────────────────────────────────────────────────────
async function openRunModal(cp, commune) {
  document.getElementById('r-cp').value      = cp||'';
  document.getElementById('r-commune').value = commune||'';
  document.getElementById('r-slcode').value  = '';
  document.getElementById('r-lbcloc').value  = '';
  document.getElementById('r-source').value  = '';
  document.getElementById('run-form').style.display = 'block';
  document.getElementById('run-log').style.display  = 'none';
  document.getElementById('log-content').innerHTML  = '';
  const btn = document.getElementById('run-action-btn');
  btn.textContent='▶ Lancer'; btn.disabled=false; btn.onclick=startRun;
  document.getElementById('run-overlay').classList.add('open');
  if (cp && commune) {
    try {
      const st = await apiFetch(`/zone/${cp}/state?commune=${encodeURIComponent(commune)}`);
      if (st.sl_code)  document.getElementById('r-slcode').value = st.sl_code;
      if (st.lbc_base) document.getElementById('r-lbcloc').value = st.lbc_base;
    } catch(e) { /* pas de state — laisser vide */ }
  }
}

function openRetryFromZone() {
  const z = zoneData;
  if (!z) return;
  const rs = z.run_status || {};
  openRetryModal(z.cp, z.commune, {
    pages_erreur_lbc: rs.err_lbc || [],
    pages_erreur_sl:  rs.err_sl  || [],
    statut: rs.status,
  });
}
function closeRunModal() {
  document.getElementById('run-overlay').classList.remove('open');
  document.getElementById('run-minimize-btn').style.display = 'none';
}

async function startRun() {
  const cp      = document.getElementById('r-cp').value.trim();
  const commune = document.getElementById('r-commune').value.trim();
  const slCode  = document.getElementById('r-slcode').value.trim();
  const lbcLoc  = document.getElementById('r-lbcloc').value.trim();
  const source  = document.getElementById('r-source').value;
  if (!cp||!commune) { alert('Code postal et commune requis'); return; }

  document.getElementById('run-form').style.display = 'none';
  document.getElementById('run-log').style.display  = 'block';
  document.getElementById('run-minimize-btn').style.display = 'inline';
  const btn = document.getElementById('run-action-btn');
  btn.textContent='En cours…'; btn.disabled=true;

  const log = document.getElementById('log-content');
  const add = (line) => {
    const d = document.createElement('div');
    d.className = line.includes('✓')||line.includes('OK')||line.includes('Terminé')?'l-ok'
      :line.includes('✗')||line.includes('ERR')||line.includes('ECHEC')?'l-err'
      :line.includes('⚠')||line.includes('WARN')?'l-warn':'';
    d.textContent=line; log.appendChild(d); log.scrollTop=log.scrollHeight;
  };

  try {
    const resp = await fetch(`${API}/run`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ cp, commune,
        ...(slCode?{sl_code:slCode}:{}),
        ...(lbcLoc?{lbc_loc:lbcLoc}:{}),
        ...(source?{source}:{}) })
    });
    const reader=resp.body.getReader(), decoder=new TextDecoder();
    let buf='';
    while (true) {
      const {done,value}=await reader.read();
      if (done) break;
      buf+=decoder.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload=JSON.parse(line.slice(6));
        if (payload==='__DONE__') {
          add('✓ Pipeline terminé');
          _miniDone(true);
          btn.textContent='Voir les résultats'; btn.disabled=false;
          btn.onclick=()=>{ closeMini(); closeRunModal(); selectZone(cp,commune); loadZones(); };
          return;
        }
        add(payload);
      }
    }
  } catch(e) {
    add('✗ Erreur connexion API : '+e.message);
    add('  Vérifiez que python3 api.py est lancé.');
    _miniDone(false);
    btn.textContent='Fermer'; btn.disabled=false; btn.onclick=closeRunModal;
  }
}

// ── Sélection entités ────────────────────────────────────────────────────────
function toggleEntity(cb) {
  const nom = cb.dataset.nom;
  if (cb.checked) selectedEntities.add(nom);
  else selectedEntities.delete(nom);
  _syncCbAll();
  updateSelectionPanel();
}

function toggleAllEntities(checked) {
  const z = zoneData;
  if (!z) return;
  (z.entites || []).forEach(e => {
    if (checked) selectedEntities.add(e.nom);
    else selectedEntities.delete(e.nom);
  });
  document.querySelectorAll('.ent-cb:not(#cb-all)').forEach(cb => cb.checked = checked);
  updateSelectionPanel();
}

function clearSelection() {
  selectedEntities.clear();
  document.querySelectorAll('.ent-cb').forEach(cb => cb.checked = false);
  updateSelectionPanel();
}

function _syncCbAll() {
  const all  = document.querySelectorAll('.ent-cb:not(#cb-all)');
  const chk  = document.querySelectorAll('.ent-cb:not(#cb-all):checked');
  const cbAll = document.getElementById('cb-all');
  if (!cbAll) return;
  cbAll.checked       = chk.length === all.length && all.length > 0;
  cbAll.indeterminate = chk.length > 0 && chk.length < all.length;
}

function removeFromSel(nom) {
  selectedEntities.delete(nom);
  document.querySelectorAll('.ent-cb:not(#cb-all)').forEach(cb => {
    if (cb.dataset.nom === nom) cb.checked = false;
  });
  _syncCbAll();
  updateSelectionPanel();
}

function updateSelectionPanel() {
  const z = zoneData;
  if (!z) return;
  const panel = document.getElementById('sel-panel');
  const body  = document.getElementById('sel-body');
  if (!panel || !body) return;

  if (selectedEntities.size === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';

  const entites      = z.entites || [];
  const totalMandats = z.nb_mandats || 0;
  const totalBiens   = z.nb_biens   || 0;

  const selList     = entites.filter(e => selectedEntities.has(e.nom));
  const selMandats  = selList.reduce((s, e) => s + e.nb_mandats, 0);
  const selBiens    = selList.reduce((s, e) => s + e.nb_biens,   0);
  const othMandats  = totalMandats - selMandats;
  const othBiens    = totalBiens   - selBiens;
  const othCount    = entites.length - selectedEntities.size;

  const selPct = totalMandats ? Math.round(selMandats / totalMandats * 100) : 0;
  const othPct = 100 - selPct;

  const tags = [...selectedEntities].map(nom =>
    `<span class="sel-tag">${htmlEsc(nom)}<span class="sel-tag-x" onclick="removeFromSel(${JSON.stringify(nom)})">×</span></span>`
  ).join('');

  body.innerHTML = `
    <div style="margin-bottom:14px;line-height:2">${tags}</div>
    <div class="bar-row">
      <span class="bar-lbl" style="width:160px;font-weight:600;color:#553c9a">Sélection (${selectedEntities.size})</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${selPct}%;background:#805ad5"></div></div>
      <span class="bar-pct" style="width:42px;color:#805ad5">${selPct}%</span>
      <span style="font-size:11px;color:#718096">${selMandats} mandat${selMandats>1?'s':''} · ${selBiens} bien${selBiens>1?'s':''} uniq.</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl" style="width:160px;color:#718096">Autres (${othCount})</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${othPct}%;background:#cbd5e0"></div></div>
      <span class="bar-pct" style="width:42px;color:#a0aec0">${othPct}%</span>
      <span style="font-size:11px;color:#a0aec0">${othMandats} mandat${othMandats>1?'s':''} · ${othBiens} bien${othBiens>1?'s':''} uniq.</span>
    </div>`;
}

// ── Utils ────────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(API+path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function fmt(n)     { return n?.toLocaleString('fr-FR')?? '—'; }
function esc(s)     { return (s||'').replace(/'/g,"\\'"); }
function htmlEsc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadZones();
loadAlerts();
