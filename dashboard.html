<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ideeri — Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
       background: #f0f4f8; color: #2d3748; font-size: 14px; }
.app    { display: flex; height: 100vh; overflow: hidden; }
.sidebar{ width: 230px; background: #1a202c; color: #e2e8f0; display: flex;
          flex-direction: column; flex-shrink: 0; }
.main   { flex: 1; overflow-y: auto; }
.sb-head { padding: 20px 18px 14px; font-size: 22px; font-weight: 800; color: #fff;
           border-bottom: 1px solid #2d3748; letter-spacing: -.5px; }
.sb-head em { color: #f6993f; font-style: normal; }
.sb-panel { display: flex; flex-direction: column; flex: 1 1 0; min-height: 0;
            border-top: 1px solid #2d3748; }
.sb-panel.collapsed { flex: 0 0 auto; }
.sb-panel-head { padding: 7px 18px; font-size: 10px; text-transform: uppercase;
                 letter-spacing: .08em; color: #718096; cursor: pointer;
                 display: flex; justify-content: space-between; align-items: center;
                 user-select: none; transition: background .12s; flex-shrink: 0; }
.sb-panel-head:hover { background: #2d3748; color: #a0aec0; }
.sb-panel-head.alert { color: #e53e3e; }
.sb-panel-head.alert:hover { color: #fc8181; }
.sb-arrow { font-size: 9px; transition: transform .15s; }
.sb-panel.collapsed .sb-arrow { transform: rotate(-90deg); }
.sb-panel-body { flex: 1; overflow-y: auto; min-height: 0; }
.sb-panel.collapsed .sb-panel-body { display: none; }
.sb-entite-item { padding: 8px 18px; cursor: pointer; font-size: 12px;
                  transition: background .1s; border-left: 3px solid transparent; }
.sb-entite-item:hover { background: #2d3748; border-left-color: #f6993f; }
.sb-entite-item.active { background: #2b3a4e; border-left-color: #f6993f; }
.sb-entite-item .e-nom { font-weight: 600; }
.sb-entite-item .e-type { font-size: 10px; color: #4a5568; margin-top: 1px; }
.sb-run-item { padding: 8px 18px; font-size: 11px; color: #718096;
               border-left: 3px solid transparent; cursor: pointer; transition: background .1s; }
.sb-run-item:hover { background: #2d3748; }
.sb-run-item.running { color: #ed8936; border-left-color: #ed8936; background: #2d2416; }
.sb-run-item.ok      { border-left-color: #48bb78; }
.sb-run-item.error   { border-left-color: #fc8181; }
.sb-run-item .ri-cp  { font-weight: 600; font-size: 12px; }
.sb-run-item .ri-meta { color: #4a5568; margin-top: 2px; }
.sb-section { padding: 12px 18px 4px; font-size: 10px; text-transform: uppercase;
              letter-spacing: .08em; color: #4a5568; }
.zone-item { padding: 10px 18px; cursor: pointer; transition: background .12s;
             border-left: 3px solid transparent; }
.zone-item:hover { background: #2d3748; }
.zone-item.active { background: #2b4c7e; border-left-color: #63b3ed; }
.zone-item .cp    { font-weight: 600; font-size: 13px; }
.zone-item .zname { font-size: 11px; color: #718096; margin-top: 2px; }
.zone-item .zmeta { font-size: 10px; color: #4a5568; margin-top: 1px; }
.zone-item.active .zname { color: #90cdf4; }
.zone-item.active .zmeta { color: #4a90d9; }
.sb-add { margin: 12px 16px 16px; padding: 8px 12px; background: #2d3748;
          border: 1px dashed #4a5568; border-radius: 6px; color: #718096;
          font-size: 12px; cursor: pointer; text-align: center; transition: background .12s; }
.sb-add:hover { background: #3d4f63; color: #e2e8f0; }
.page-head { padding: 26px 30px 0; display: flex; justify-content: space-between; align-items: flex-start; }
.page-title { font-size: 24px; font-weight: 700; line-height: 1.2; }
.page-sub   { font-size: 12px; color: #718096; margin-top: 4px; }
.btn { padding: 8px 16px; border-radius: 7px; border: none; cursor: pointer;
       font-size: 13px; font-weight: 600; transition: background .15s; }
.btn-primary { background: #3182ce; color: #fff; }
.btn-primary:hover { background: #2b6cb0; }
.btn-ghost { background: #e2e8f0; color: #4a5568; }
.btn-ghost:hover { background: #cbd5e0; }
.content { padding: 22px 30px 40px; }
.cards { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 22px; }
.card { background: #fff; border-radius: 12px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.card-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: #718096; margin-bottom: 8px; }
.card-val { font-size: 30px; font-weight: 700; line-height: 1; color: #1a202c; }
.card-sub { font-size: 11px; color: #a0aec0; margin-top: 6px; }
.card-sub strong { color: #718096; }
.grid2 { display: grid; grid-template-columns: 200px 1fr; gap: 14px; margin-bottom: 14px; }
.panel { background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
.p-head { padding: 14px 20px; border-bottom: 1px solid #edf2f7;
          display: flex; justify-content: space-between; align-items: center; }
.p-title { font-size: 13px; font-weight: 600; color: #2d3748; }
.p-body  { padding: 16px 20px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.bar-row:last-child { margin-bottom: 0; }
.bar-lbl  { font-size: 12px; color: #4a5568; width: 90px; }
.bar-wrap { flex: 1; background: #edf2f7; border-radius: 99px; height: 7px; overflow: hidden; }
.bar-fill { height: 7px; border-radius: 99px; transition: width .6s ease; }
.bar-pct  { font-size: 12px; font-weight: 700; width: 36px; text-align: right; color: #2d3748; }
.c-lbc  { background: #ed8936; }
.c-sl   { background: #3182ce; }
.c-both { background: #38a169; }
.pc-item { display: flex; justify-content: space-between; align-items: center;
           padding: 8px 0; border-bottom: 1px solid #f7fafc; font-size: 12px; }
.pc-item:last-child { border: none; }
.pc-agency { color: #4a5568; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.down { color: #38a169; font-weight: 700; }
.up   { color: #e53e3e; font-weight: 700; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { padding: 9px 14px; text-align: left; font-size: 10px; text-transform: uppercase;
     letter-spacing: .05em; color: #718096; background: #f7fafc;
     border-bottom: 1px solid #edf2f7; cursor: pointer; user-select: none; }
th:hover { color: #2d3748; }
td { padding: 10px 14px; border-bottom: 1px solid #f7fafc; vertical-align: middle; }
tr:last-child td { border: none; }
tr:hover td { background: #fafbfc; cursor: pointer; }
.ent-name { color: #3182ce; font-weight: 500; }
.ent-name:hover { text-decoration: underline; }
.rank { display: inline-flex; align-items: center; justify-content: center;
        width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: 700; }
.rank-1 { background: #fef3c7; color: #92400e; border: 1.5px solid #f6d860; }
.rank-2 { background: #f1f5f9; color: #475569; border: 1.5px solid #cbd5e0; }
.rank-3 { background: #fce8e0; color: #9a3412; border: 1.5px solid #f5bba3; }
.rank-n { background: #f7fafc; color: #a0aec0; border: 1.5px solid #e2e8f0; font-size: 10px; }
.pdm-wrap { display: flex; align-items: center; gap: 8px; min-width: 140px; }
.pdm-bg   { flex: 1; height: 6px; background: #edf2f7; border-radius: 3px; overflow: hidden; }
.pdm-fill { height: 6px; border-radius: 3px; }
.pdm-pct  { font-size: 12px; font-weight: 700; min-width: 34px; text-align: right; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
.b-lbc  { background: #fef3c7; color: #92400e; }
.b-sl   { background: #dbeafe; color: #1e40af; }
.b-both { background: #d1fae5; color: #065f46; }
.tag-part { font-size: 11px; color: #805ad5; background: #faf5ff; padding: 1px 6px; border-radius: 4px; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
           z-index: 200; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: #fff; border-radius: 14px; width: 540px; max-height: 85vh;
         display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.m-head { padding: 20px 24px; border-bottom: 1px solid #edf2f7;
          display: flex; justify-content: space-between; align-items: center; }
.m-title { font-size: 16px; font-weight: 700; }
.m-close { background: none; border: none; cursor: pointer; font-size: 24px; color: #a0aec0; line-height: 1; }
.m-close:hover { color: #4a5568; }
.m-body { padding: 24px; flex: 1; overflow-y: auto; }
.m-foot { padding: 14px 24px; border-top: 1px solid #edf2f7; display: flex; justify-content: flex-end; gap: 8px; }
.form-row { margin-bottom: 16px; }
.form-row label { display: block; font-size: 12px; font-weight: 600; color: #4a5568; margin-bottom: 6px; }
.form-row input, .form-row select { width: 100%; padding: 9px 12px; border: 1px solid #cbd5e0;
  border-radius: 7px; font-size: 13px; outline: none; color: #2d3748; }
.form-row input:focus, .form-row select:focus { border-color: #3182ce; }
.log-box { background: #1a202c; border-radius: 8px; padding: 14px; font-family: monospace;
           font-size: 11.5px; color: #cbd5e0; height: 280px; overflow-y: auto;
           white-space: pre-wrap; line-height: 1.6; }
.l-ok   { color: #68d391; }
.l-err  { color: #fc8181; }
.l-warn { color: #f6e05e; }
.empty  { text-align: center; padding: 40px; color: #a0aec0; font-size: 14px; }
.dimmed { color: #cbd5e0; }
.api-err { background: #fee2e2; color: #991b1b; border-radius: 8px; padding: 12px 16px;
           font-size: 13px; margin: 20px; }
.alert-item { border-left: 3px solid #e53e3e; background: #1a1010; transition: background .12s; }
.alert-item:hover { background: #2d1515; }
.alert-item .a-cp   { font-weight: 600; font-size: 12px; color: #fc8181; }
.alert-item .a-info { font-size: 10px; color: #fc8181; opacity: .7; margin-top: 2px; }
.sb-section-alert { padding: 12px 18px 4px; font-size: 10px; text-transform: uppercase;
                    letter-spacing: .08em; color: #e53e3e; }
.wait-slider { width: 100%; accent-color: #3182ce; }
.wait-labels { display: flex; justify-content: space-between; font-size: 11px; color: #718096; margin-top: 4px; }
.page-pill { display: inline-flex; align-items: center; justify-content: center;
             width: 30px; height: 26px; border-radius: 5px; font-size: 12px; font-weight: 600;
             cursor: pointer; border: 1.5px solid transparent; margin: 2px; transition: all .1s; }
.pill-scraped  { border-color: #9ae6b4; background: #f0fff4; color: #276749; }
.pill-missing  { border-color: #fbd38d; background: #fffaf0; color: #744210; }
.pill-selected { border-color: #3182ce; background: #3182ce; color: #fff; }
.portal-section { background: #f7fafc; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
.portal-title { font-size: 12px; font-weight: 600; color: #2d3748; margin-bottom: 2px; }
.portal-meta  { font-size: 11px; color: #718096; margin-bottom: 8px; }
.last-run-box { background: #edf2f7; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px;
                font-size: 12px; color: #4a5568; line-height: 1.6; }
.zrun { font-size: 10px; margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.zrun-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.zrun-text { color: #4a5568; }
.zone-item.active .zrun-text { color: #5a9fd4; }
.dot-fresh   { background: #48bb78; }
.dot-stale   { background: #718096; }
.dot-partial { background: #ed8936; }
.dot-error   { background: #fc8181; }
.dot-never   { background: #4a5568; }
.ent-activity { font-size: 11px; color: #a0aec0; margin-top: 5px; }
.ent-cb { width: 15px; height: 15px; cursor: pointer; accent-color: #805ad5; }
.sel-tag { display: inline-flex; align-items: center; gap: 4px; background: #faf5ff;
           color: #553c9a; border: 1px solid #d6bcfa; border-radius: 99px;
           padding: 2px 10px 2px 8px; font-size: 11px; font-weight: 500; margin: 2px 3px; }
.sel-tag .sel-tag-x { cursor: pointer; opacity: .5; font-size: 14px; line-height: 1; }
.sel-tag .sel-tag-x:hover { opacity: 1; }
.mini-bar { position: fixed; bottom: 0; right: 24px; width: 290px; background: #1e2a3a;
            border-radius: 8px 8px 0 0; box-shadow: 0 -4px 24px rgba(0,0,0,.4);
            z-index: 300; cursor: pointer; user-select: none; }
.mini-bar-head { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.mini-bar-info .mini-bar-title { color: #e2e8f0; font-size: 12px; font-weight: 600; }
.mini-bar-info .mini-bar-status { font-size: 11px; color: #718096; margin-top: 2px; }
.mini-bar-btns { display: flex; gap: 2px; flex-shrink: 0; }
.mini-btn { background: none; border: none; color: #718096; cursor: pointer;
            font-size: 20px; line-height: 1; padding: 0 4px; }
.mini-btn:hover { color: #e2e8f0; }
.m-minimize { background: none; border: none; cursor: pointer; font-size: 22px;
              color: #a0aec0; line-height: 1; padding: 0 6px; }
.m-minimize:hover { color: #4a5568; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
.mini-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
            margin-right: 5px; vertical-align: middle; }
.mini-dot.running { background: #ed8936; animation: pulse 1.4s ease-in-out infinite; }
.mini-dot.done    { background: #48bb78; }
.mini-dot.error   { background: #fc8181; }
#zones-scroll { flex: 1; overflow-y: auto; min-height: 0; }
.sb-search { padding: 8px 12px 4px; }
.sb-search input { width: 100%; padding: 7px 10px; border-radius: 6px;
                   border: 1px solid #2d3748; background: #2d3748; color: #e2e8f0;
                   font-size: 12px; outline: none; }
.sb-search input:focus { border-color: #4a90d9; background: #3d4f63; }
.sb-search input::placeholder { color: #4a5568; }
.sb-run-indicator { padding: 10px 18px; cursor: pointer; display: flex; align-items: center;
                   gap: 8px; font-size: 12px; font-weight: 500; transition: background .12s; }
.sb-run-indicator.running { background: #2d2416; color: #ed8936; border-left: 3px solid #ed8936; }
.sb-run-indicator.done    { background: #1a2e20; color: #68d391; border-left: 3px solid #48bb78; }
.sb-run-indicator.error   { background: #2d1515; color: #fc8181; border-left: 3px solid #fc8181; }
.sb-run-indicator:hover   { filter: brightness(1.2); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-head" onclick="showHome()" style="cursor:pointer;user-select:none">Ide<em>eri</em></div>

    <!-- Panel 1 : Entités -->
    <div class="sb-panel" id="spanel-entites">
      <div class="sb-panel-head" onclick="togglePanel('entites')">
        <span>Entités</span><span class="sb-arrow" id="sarrow-entites">▾</span>
      </div>
      <div class="sb-panel-body" id="sbody-entites">
        <div class="sb-search" style="position:relative">
          <input id="entite-search-input" type="text" placeholder="Nom de l'agence…"
                 autocomplete="off" oninput="onEntiteSearch(this.value)">
          <button id="entite-search-clear" onclick="clearEntiteSearch()"
            style="display:none;position:absolute;right:18px;top:50%;transform:translateY(-50%);
                   background:none;border:none;cursor:pointer;color:#718096;font-size:16px;line-height:1">×</button>
        </div>
        <div id="sb-entite-results"></div>
      </div>
    </div>

    <!-- Panel 2 : Zones -->
    <div class="sb-panel" id="spanel-zones">
      <div class="sb-panel-head" onclick="togglePanel('zones')">
        <span id="zone-section-label">Zones</span><span class="sb-arrow" id="sarrow-zones">▾</span>
      </div>
      <div class="sb-panel-body" id="sbody-zones">
        <div class="sb-search">
          <input type="text" id="zone-search" placeholder="CP ou ville…" oninput="filterZones(this.value)" autocomplete="off">
        </div>
        <div id="zones-list"><div class="empty" style="color:#4a5568;padding:20px;font-size:11px">Chargement…</div></div>
      </div>
    </div>

    <!-- Panel 3 : Runs -->
    <div class="sb-panel collapsed" id="spanel-runs">
      <div class="sb-panel-head" onclick="togglePanel('runs')">
        <span>Runs</span><span class="sb-arrow" id="sarrow-runs">▾</span>
      </div>
      <div class="sb-panel-body" id="sbody-runs">
        <div id="sb-running" class="sb-run-indicator running" style="display:none" onclick="restoreFromMini()">
          <span class="mini-dot running" id="sb-dot"></span>
          <span id="sb-running-text">Run en cours…</span>
        </div>
        <div id="sb-runs-list"><div class="empty" style="color:#4a5568;padding:12px 18px;font-size:11px">Chargement…</div></div>
      </div>
    </div>

    <!-- Panel 4 : Incomplets -->
    <div class="sb-panel collapsed" id="spanel-incomplets">
      <div class="sb-panel-head alert" onclick="togglePanel('incomplets')">
        <span id="incomplets-label">Incomplets</span><span class="sb-arrow" id="sarrow-incomplets">▾</span>
      </div>
      <div class="sb-panel-body" id="sbody-incomplets">
        <div id="alerts-list"></div>
      </div>
    </div>

    <div class="sb-add" onclick="openRunModal()">+ Nouvelle zone</div>
  </aside>
  <div class="main" id="main">
    <div id="home-view">
      <div id="map" style="height:100vh;width:100%"></div>
    </div>
    <div id="zone-content" style="display:none"></div>
  </div>
</div>

<div class="overlay" id="run-overlay">
  <div class="modal" style="width:580px">
    <div class="m-head">
      <span class="m-title" id="run-title">Lancer un run</span>
      <div style="display:flex;align-items:center;gap:2px">
        <button class="m-minimize" id="run-minimize-btn" onclick="minimizeModal('run')" title="Réduire" style="display:none">─</button>
        <button class="m-close" onclick="closeRunModal()">×</button>
      </div>
    </div>
    <div class="m-body">
      <!-- Nouvelle zone -->
      <div id="run-new-form" style="display:none">
        <div class="form-row"><label>Code postal *</label><input type="text" id="r-cp" placeholder="ex : 69700"></div>
        <div class="form-row"><label>Commune *</label><input type="text" id="r-commune" placeholder="ex : Givors"></div>
        <div class="form-row">
          <label>Code SeLoger <span style="color:#a0aec0;font-weight:400">(optionnel — ex : AD08FR28776)</span></label>
          <input type="text" id="r-slcode" placeholder="AD08FRXXXXX">
        </div>
        <div class="form-row">
          <label>Localisation LBC <span style="color:#a0aec0;font-weight:400">(optionnel — coller l'URL LBC depuis le navigateur)</span></label>
          <input type="text" id="r-lbcloc" placeholder="https://www.leboncoin.fr/recherche?… ou Vérin_42410__45.45_4.75_2455">
        </div>
        <div class="form-row"><label>Source</label>
          <select id="r-source">
            <option value="">LBC + SeLoger</option>
            <option value="lbc">LBC uniquement</option>
            <option value="seloger">SeLoger uniquement</option>
          </select>
        </div>
      </div>
      <!-- Zone existante : info + sélecteurs de pages -->
      <div id="run-existing-form" style="display:none">
        <div id="run-last-info"></div>
        <div id="run-sl-section"></div>
        <div id="run-lbc-section"></div>
        <div class="form-row">
          <label>Wait LBC (ms) — augmenter si HTTP 500 persistant</label>
          <input type="range" class="wait-slider" id="run-wait" min="6000" max="14000" step="1000" value="8000" oninput="updateRunWaitLabel()">
          <div class="wait-labels"><span>6 000ms</span><span id="run-wait-val" style="font-weight:700;color:#2d3748">8 000ms</span><span>14 000ms</span></div>
        </div>
      </div>
      <div id="run-log" style="display:none"><div class="log-box" id="log-content"></div></div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeRunModal()">Annuler</button>
      <button class="btn btn-ghost" id="run-accept-btn" onclick="acceptRunIncomplete()" title="Marquer comme complet sans relancer le scraping" style="display:none;color:#718096">✓ Accepter état actuel</button>
      <button class="btn btn-primary" id="run-action-btn" onclick="startRun()">▶ Lancer</button>
    </div>
  </div>
</div>

<div id="mini-bar" class="mini-bar" style="display:none" onclick="restoreFromMini()">
  <div class="mini-bar-head">
    <div class="mini-bar-info">
      <div class="mini-bar-title" id="mini-title">En cours…</div>
      <div class="mini-bar-status" id="mini-status"><span class="mini-dot running" id="mini-dot"></span>En cours</div>
    </div>
    <div class="mini-bar-btns">
      <button class="mini-btn" onclick="event.stopPropagation();restoreFromMini()" title="Agrandir">⬜</button>
      <button class="mini-btn" id="mini-close-btn" onclick="event.stopPropagation();closeMini()" title="Fermer" style="display:none">×</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
let currentCp = '';
let currentCommune = '';
let sortCol = 'mandats';
let sortAsc = false;
let zoneData = null;

let _runMode = 'new'; // 'new' | 'existing'
let _runCp = '', _runCommune = '';
let _runState = null;
let _selLbc = new Set();
let _selSl  = new Set();
let _lbcTotalPages = 0;
let selectedEntities = new Set();

// ── Mini-bar (modal réduit) ──────────────────────────────────────────────────
let _miniTarget = null;
let _logPoller  = null;
let _logIdx     = 0;
let _miniRunning = false;
let _miniSnapshot = null; // snapshot du contexte sauvegardé au minimize

function minimizeModal(target) {
  _miniTarget = target;
  // Snapshot du contexte courant pour restauration fidèle
  _miniSnapshot = {
    logHtml:  document.getElementById('log-content').innerHTML,
    title:    document.getElementById('run-title').textContent,
    cp:       _runCp,
    commune:  _runCommune,
  };
  document.getElementById('run-overlay').classList.remove('open');
  const label = _runMode === 'existing'
    ? `${_runCommune} ${_runCp}`
    : `${(document.getElementById('r-commune').value||'').trim() || '…'} ${(document.getElementById('r-cp').value||'').trim()}`;
  // Sidebar indicator
  const sb = document.getElementById('sb-running');
  sb.className = 'sb-run-indicator running';
  sb.style.display = 'flex';
  document.getElementById('sb-dot').className = 'mini-dot running';
  document.getElementById('sb-running-text').textContent = `Run en cours — ${label}`;
  // Mini-bar (secondaire)
  document.getElementById('mini-title').textContent  = `Run — ${label}`;
  document.getElementById('mini-status').innerHTML   = '<span class="mini-dot running" id="mini-dot"></span>En cours…';
  document.getElementById('mini-bar').style.display  = 'block';
  document.getElementById('mini-close-btn').style.display = 'none';
  _miniRunning = true;
}

function restoreFromMini() {
  if (!_miniTarget) return;
  // Restaurer le contexte sauvegardé, même si openRunModal a été appelé entre-temps
  if (_miniSnapshot) {
    _runCp      = _miniSnapshot.cp;
    _runCommune = _miniSnapshot.commune;
    document.getElementById('run-title').textContent        = _miniSnapshot.title;
    document.getElementById('log-content').innerHTML        = _miniSnapshot.logHtml;
    document.getElementById('run-log').style.display        = 'block';
    document.getElementById('run-new-form').style.display   = 'none';
    document.getElementById('run-existing-form').style.display = 'none';
    document.getElementById('run-minimize-btn').style.display  = _miniRunning ? 'inline' : 'none';
    document.getElementById('run-accept-btn').style.display    = 'none';
    const btn = document.getElementById('run-action-btn');
    btn.style.display = 'none';
  }
  document.getElementById('run-overlay').classList.add('open');
  document.getElementById('mini-bar').style.display = 'none';
}

function closeMini() {
  document.getElementById('mini-bar').style.display = 'none';
  if (!_miniRunning) {
    document.getElementById('sb-running').style.display = 'none';
    _miniTarget = null;
  }
}

function _startLogPoller(cp) {
  if (_logPoller) clearInterval(_logPoller);
  if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; }
  _logIdx = 0;
  if (_miniSnapshot) _miniSnapshot.logHtml = '';

  const tick = async () => {
    try {
      const data = await apiFetch(`/run/${cp}/logs?from=${_logIdx}`);
      if (data.lines && data.lines.length) {
        let fragment = '';
        data.lines.forEach(line => {
          const cls = line.includes('✓')||line.includes('OK')||line.includes('Terminé') ? 'l-ok'
            : line.includes('✗')||line.includes('ERR')||line.includes('ECHEC') ? 'l-err'
            : line.includes('⚠')||line.includes('WARN') ? 'l-warn' : '';
          fragment += `<div class="${cls}">${htmlEsc(line)}</div>`;
        });
        _logIdx += data.lines.length;
        if (_miniSnapshot) _miniSnapshot.logHtml += fragment;
        const log = document.getElementById('log-content');
        if (log) { log.insertAdjacentHTML('beforeend', fragment); log.scrollTop = log.scrollHeight; }
      }
      if (data.done !== null) {
        clearInterval(_logPoller); _logPoller = null;
        _miniDone(data.done === true);
        loadZones(); loadAlerts();
      }
    } catch(_) {}
  };

  tick();
  _logPoller = setInterval(tick, 1500);
}

async function _startLogOrRunPoller(cp) {
  try {
    const data = await apiFetch(`/run/${cp}/logs`);
    if (data.tracked) { _startLogPoller(cp); return; }
  } catch(_) {}
  _startRunPoller(cp);
}

function _miniDone(ok) {
  _miniRunning = false;
  localStorage.removeItem('active_run');
  if (_logPoller) { clearInterval(_logPoller); _logPoller = null; }
  document.getElementById('mini-close-btn').style.display = 'inline';
  // Mini-bar
  const dot = document.getElementById('mini-dot');
  if (dot) dot.className = `mini-dot ${ok ? 'done' : 'error'}`;
  const txt = document.getElementById('mini-status');
  if (txt) txt.innerHTML = `<span class="mini-dot ${ok?'done':'error'}"></span>${ok ? '✓ Terminé — cliquer pour voir' : '✗ Erreur'}`;
  // Sidebar indicator
  const sb = document.getElementById('sb-running');
  if (sb && sb.style.display !== 'none') {
    sb.className = `sb-run-indicator ${ok ? 'done' : 'error'}`;
    document.getElementById('sb-dot').className = `mini-dot ${ok ? 'done' : 'error'}`;
    document.getElementById('sb-running-text').textContent = ok ? '✓ Terminé — cliquer pour voir' : '✗ Erreur — cliquer pour voir';
  }
}

// ── Run status ──────────────────────────────────────────────────────────────
function _runStatusHtml(rs) {
  if (!rs || rs.status === 'never')
    return `<div class="zrun"><span class="zrun-dot dot-never"></span><span class="zrun-text">jamais scrapé</span></div>`;
  const dot  = `dot-${rs.status}`;
  const date = rs.date ? new Date(rs.date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'}) : '—';
  const lbc  = rs.lbc_pages > 0
    ? (rs.err_lbc?.length ? `LBC ⚠${rs.err_lbc.length}err` : `LBC ✓${rs.lbc_pages}p`) : '';
  const sl   = rs.sl_pages > 0
    ? (rs.err_sl?.length  ? `SL ⚠${rs.err_sl.length}err`   : `SL ✓${rs.sl_pages}p`)   : '';
  const parts = [date, lbc, sl].filter(Boolean).join(' · ');
  return `<div class="zrun"><span class="zrun-dot ${dot}"></span><span class="zrun-text">${parts}</span></div>`;
}

// ── Alertes runs incomplets ───────────────────────────────────────────────────
async function loadAlerts() {
  try {
    const alerts = await apiFetch('/incomplete');
    const list  = document.getElementById('alerts-list');
    const label = document.getElementById('incomplets-label');
    const panel = document.getElementById('spanel-incomplets');
    if (!alerts.length) {
      list.innerHTML = '<div style="color:#4a5568;padding:12px 18px;font-size:11px">Aucun scrape incomplet</div>';
      if (label) label.textContent = 'Incomplets';
      return;
    }
    if (label) label.textContent = `⚠ Incomplets (${alerts.length})`;
    if (panel && panel.classList.contains('collapsed')) panel.classList.remove('collapsed');
    list.innerHTML = alerts.map(a => {
      const parts = [];
      if (a.pages_erreur_lbc?.length) parts.push(`LBC p${a.pages_erreur_lbc.join(',')}`);
      if (a.pages_erreur_sl?.length)  parts.push(`SL p${a.pages_erreur_sl.join(',')}`);
      if (a.statut === 'error')   parts.push('transform crashé');
      if (a.statut === 'running') parts.push('bloqué en running');
      return `<div class="alert-item" style="display:flex;align-items:flex-start;gap:0">
        <div style="flex:1;padding:9px 0 9px 18px;cursor:pointer" onclick="openRunModal('${a.cp}','${esc(a.commune)}')">
          <div class="a-cp">${a.cp} ${a.commune}</div>
          <div class="a-info">${parts.join(' · ') || 'incomplet'}</div>
        </div>
        <button onclick="event.stopPropagation();dismissAlert('${a.cp}','${esc(a.commune)}')"
                style="background:none;border:none;color:#fc8181;cursor:pointer;padding:8px 12px;font-size:18px;line-height:1;opacity:.45;flex-shrink:0;align-self:center"
                title="Masquer">×</button>
      </div>`;
    }).join('');
  } catch(e) { /* silencieux si l'API n'est pas dispo */ }
}

async function dismissAlert(cp, commune) {
  try {
    await fetch(`${API}/zone/${cp}/accept-incomplete`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({commune})
    });
    loadAlerts();
  } catch(e) { /* silencieux */ }
}

// ── Run modal (unifié : nouvelle zone + relancer existante) ──────────────────

async function openRunModal(cp, commune) {
  _runCp = cp || ''; _runCommune = commune || '';

  document.getElementById('run-log').style.display = 'none';
  document.getElementById('log-content').innerHTML = '';
  document.getElementById('run-minimize-btn').style.display = 'none';
  const btn = document.getElementById('run-action-btn');
  btn.textContent = '▶ Lancer'; btn.disabled = false; btn.onclick = startRun;

  if (!cp || !commune) {
    _runMode = 'new';
    document.getElementById('run-title').textContent = 'Lancer un run';
    document.getElementById('run-new-form').style.display = 'block';
    document.getElementById('run-existing-form').style.display = 'none';
    document.getElementById('run-accept-btn').style.display = 'none';
    document.getElementById('r-cp').value = '';
    document.getElementById('r-commune').value = '';
    document.getElementById('r-slcode').value = '';
    document.getElementById('r-lbcloc').value = '';
    document.getElementById('r-source').value = '';
  } else {
    _runMode = 'existing';
    document.getElementById('run-title').textContent = `▶ Relancer — ${commune} ${cp}`;
    document.getElementById('run-new-form').style.display = 'none';
    document.getElementById('run-existing-form').style.display = 'block';
    document.getElementById('run-accept-btn').style.display = 'inline';
    document.getElementById('run-last-info').innerHTML = '<div style="color:#a0aec0;font-size:12px;padding:8px 0">Chargement…</div>';
    document.getElementById('run-sl-section').innerHTML = '';
    document.getElementById('run-lbc-section').innerHTML = '';
    document.getElementById('run-wait').value = '8000';
    document.getElementById('run-wait-val').textContent = '8 000ms';
    _selLbc = new Set(); _selSl = new Set(); _runState = null; _lbcTotalPages = 0;
    try {
      const st = await apiFetch(`/zone/${cp}/state?commune=${encodeURIComponent(commune)}`);
      _runState = st;
      _buildExistingZoneUI(st);
    } catch(e) {
      document.getElementById('run-last-info').innerHTML = `<div style="color:#fc8181;font-size:12px">Erreur : ${e.message}</div>`;
    }
  }
  document.getElementById('run-overlay').classList.add('open');
}

function _buildExistingZoneUI(st) {
  // Dernier run
  const lr = st.last_run;
  let lrHtml = '';
  if (lr) {
    const date = new Date(lr.scraped_at).toLocaleDateString('fr-FR', {day:'numeric',month:'short',year:'numeric'});
    const ok   = lr.statut === 'ok';
    const stat = ok ? '<span style="color:#38a169;font-weight:600">✓ ok</span>'
                    : `<span style="color:#e53e3e;font-weight:600">✗ ${lr.statut}</span>`;
    lrHtml = `<div class="last-run-box"><strong>Dernier run :</strong> ${date} · ${stat} · ${lr.nb_annonces_trouvees||0} annonces</div>`;
  }
  document.getElementById('run-last-info').innerHTML = lrHtml;

  // SeLoger
  const slTotal   = st.sl_pages || 0;
  const slScraped = new Set(st.sl_scraped || []);
  const slErr     = new Set(st.pages_erreur_sl || []);
  _selSl = new Set();
  for (let p = 1; p <= slTotal; p++) if (!slScraped.has(p) || slErr.has(p)) _selSl.add(p);
  document.getElementById('run-sl-section').innerHTML = _portalSection('sl', 'SeLoger', slTotal, slScraped, slErr);

  // LBC
  const lbcTotal   = st.lbc_pages || 0;
  const lbcScraped = new Set(st.lbc_scraped || []);
  const lbcErr     = new Set(st.pages_erreur_lbc || []);
  _lbcTotalPages   = lbcTotal || Math.max(0, ...lbcScraped);
  _selLbc = new Set();
  if (_lbcTotalPages > 0) {
    for (let p = 1; p <= _lbcTotalPages; p++) if (!lbcScraped.has(p) || lbcErr.has(p)) _selLbc.add(p);
  }
  document.getElementById('run-lbc-section').innerHTML = _portalSection('lbc', 'LBC', lbcTotal, lbcScraped, lbcErr, lbcTotal === 0);
}

function _portalSection(src, label, total, scraped, errors, showTotalInput=false) {
  const nScraped = scraped.size;
  let meta = total > 0
    ? `${total} page${total>1?'s':''} identifiée${total>1?'s':''} · ${nScraped} scrapée${nScraped>1?'s':''}`
    : `<span style="color:#ed8936">Sondage échoué — nombre de pages inconnu</span>`;

  let html = `<div class="portal-section">
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <div class="portal-title">${label}</div>
      <div class="portal-meta">${meta}</div>
    </div>`;

  if (showTotalInput) {
    html += `<div style="display:flex;align-items:center;gap:10px;margin:8px 0 8px;flex-wrap:wrap">
      <button class="btn btn-primary" style="font-size:12px;padding:5px 12px" onclick="startLbcFullRun()">▶ Run complet LBC</button>
      <span style="font-size:11px;color:#718096">relance le sondage + toutes les pages automatiquement</span>
    </div>
    <div style="font-size:11px;color:#a0aec0;margin-bottom:6px">ou sélectionner les pages manuellement :</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px;color:#4a5568">
      <span>Total pages estimé :</span>
      <input type="number" id="lbc-total-input" min="1" max="30" value="${_lbcTotalPages||''}"
             style="width:64px;padding:4px 8px;border:1px solid #cbd5e0;border-radius:5px;font-size:12px"
             oninput="updateLbcTotal(this.value)">
    </div>`;
  }

  const sel = src === 'lbc' ? _selLbc : _selSl;
  const maxP = Math.max(total, ...[...scraped], ...[...sel], 0);
  html += `<div id="${src}-pills" style="display:flex;flex-wrap:wrap;gap:3px;margin:8px 0 10px">`;
  if (maxP > 0) {
    for (let p = 1; p <= maxP; p++) html += _pillHtml(src, p, scraped, errors, sel);
  } else {
    html += `<span style="font-size:11px;color:#a0aec0;font-style:italic;padding:4px 0">Aucune page scrapée — entrez le nombre de pages ci-dessus</span>`;
  }
  html += `</div>`;

  if (maxP > 0) {
    const nErr = errors.size;
    html += `<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <button class="btn btn-ghost" style="font-size:11px;padding:3px 10px" onclick="selectAllPages('${src}')">Tout</button>
      <button class="btn btn-ghost" style="font-size:11px;padding:3px 10px" onclick="selectNoPages('${src}')">Rien</button>
      ${nErr ? `<span style="font-size:11px;color:#ed8936">⚠ ${nErr} page${nErr>1?'s':''} en erreur</span>` : ''}
      <span style="font-size:11px;color:#a0aec0;margin-left:4px">
        <span class="page-pill pill-scraped" style="cursor:default;font-size:10px;width:auto;padding:0 6px">déjà scrapée</span>
        <span class="page-pill pill-missing" style="cursor:default;font-size:10px;width:auto;padding:0 6px">manquante</span>
        <span class="page-pill pill-selected" style="cursor:default;font-size:10px;width:auto;padding:0 6px">à lancer</span>
      </span>
    </div>`;
  }
  return html + '</div>';
}

function _pillHtml(src, p, scraped, errors, sel) {
  const isSel  = sel.has(p);
  const isScrp = scraped.has(p) && !errors.has(p);
  const cls = 'page-pill ' + (isSel ? 'pill-selected' : isScrp ? 'pill-scraped' : 'pill-missing');
  return `<button class="${cls}" id="${src}-pill-${p}" onclick="togglePage('${src}',${p})" title="Page ${p}${isScrp?' (scrapée)':''}${errors.has(p)?' (erreur)':''}">${p}</button>`;
}

function togglePage(src, p) {
  const sel = src === 'lbc' ? _selLbc : _selSl;
  if (sel.has(p)) sel.delete(p); else sel.add(p);
  const st = _runState || {};
  const scraped = new Set((src === 'lbc' ? st.lbc_scraped : st.sl_scraped) || []);
  const errors  = new Set((src === 'lbc' ? st.pages_erreur_lbc : st.pages_erreur_sl) || []);
  const pill = document.getElementById(`${src}-pill-${p}`);
  if (pill) pill.className = 'page-pill ' + (sel.has(p) ? 'pill-selected' : (scraped.has(p) && !errors.has(p)) ? 'pill-scraped' : 'pill-missing');
}

function selectAllPages(src) {
  const st = _runState || {};
  const scraped = new Set((src === 'lbc' ? st.lbc_scraped : st.sl_scraped) || []);
  const total = src === 'lbc' ? _lbcTotalPages : (st.sl_pages || 0);
  const sel = src === 'lbc' ? _selLbc : _selSl;
  sel.clear();
  for (let p = 1; p <= Math.max(total, ...scraped, 0); p++) sel.add(p);
  scraped.forEach(p => sel.add(p));
  _refreshPills(src);
}

function selectNoPages(src) {
  (src === 'lbc' ? _selLbc : _selSl).clear();
  _refreshPills(src);
}

function _refreshPills(src) {
  const st = _runState || {};
  const total   = src === 'lbc' ? _lbcTotalPages : (st.sl_pages || 0);
  const scraped = new Set((src === 'lbc' ? st.lbc_scraped : st.sl_scraped) || []);
  const errors  = new Set((src === 'lbc' ? st.pages_erreur_lbc : st.pages_erreur_sl) || []);
  const sel = src === 'lbc' ? _selLbc : _selSl;
  const container = document.getElementById(`${src}-pills`);
  if (!container) return;
  const maxP = Math.max(total, ...[...scraped], ...[...sel], 0);
  container.innerHTML = '';
  for (let p = 1; p <= maxP; p++) container.innerHTML += _pillHtml(src, p, scraped, errors, sel);
}

function updateLbcTotal(val) {
  const n = parseInt(val);
  if (!n || n < 1 || n > 30) return;
  _lbcTotalPages = n;
  const st = _runState || {};
  const lbcScraped = new Set(st.lbc_scraped || []);
  const lbcErr     = new Set(st.pages_erreur_lbc || []);
  _selLbc = new Set();
  for (let p = 1; p <= n; p++) if (!lbcScraped.has(p) || lbcErr.has(p)) _selLbc.add(p);
  _refreshPills('lbc');
}

function updateRunWaitLabel() {
  const v = document.getElementById('run-wait').value;
  document.getElementById('run-wait-val').textContent = parseInt(v).toLocaleString('fr-FR') + 'ms';
}

function startLbcFullRun() {
  if (!_runState?.lbc_base) { alert('URL LBC non disponible dans le state'); return; }
  // Bascule en mode "new" en pré-remplissant les champs cachés
  _runMode = 'new';
  document.getElementById('r-cp').value      = _runCp;
  document.getElementById('r-commune').value = _runCommune;
  document.getElementById('r-slcode').value  = '';
  document.getElementById('r-lbcloc').value  = _runState.lbc_base;
  document.getElementById('r-source').value  = 'lbc';
  startRun();
}

async function acceptRunIncomplete() {
  const btn = document.getElementById('run-accept-btn');
  btn.disabled = true; btn.textContent = '…';
  try {
    await fetch(`${API}/zone/${_runCp}/accept-incomplete`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({commune: _runCommune})
    });
    closeRunModal(); loadAlerts(); loadZones();
  } catch(e) {
    btn.disabled = false; btn.textContent = '✓ Accepter état actuel';
  }
}

function closeRunModal() {
  if (_miniRunning) { minimizeModal('run'); return; }
  document.getElementById('run-overlay').classList.remove('open');
  document.getElementById('run-minimize-btn').style.display = 'none';
  document.getElementById('run-action-btn').style.display = 'inline';
  document.getElementById('sb-running').style.display = 'none';
  document.getElementById('mini-bar').style.display = 'none';
  _miniTarget = null;
  _miniSnapshot = null;
}

// ── Carte choroplèthe ────────────────────────────────────────────────────────
let _map = null;
let _mapData = null;

async function loadMap() {
  try {
    const zones = await apiFetch('/map');
    _mapData = zones;
    _initMap();
  } catch(e) {
    const el = document.getElementById('map');
    if (el) el.innerHTML = '<div class="empty" style="padding:60px;color:#718096;text-align:center">Aucune donnée — lancez un run pour commencer</div>';
  }
}

function _initMap() {
  const el = document.getElementById('map');
  if (!el) return;
  if (_map) { _map.remove(); _map = null; }

  _map = L.map('map', { zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO', maxZoom: 16
  }).addTo(_map);

  const zones = (_mapData || []).filter(z => z.code_insee);
  if (!zones.length) { _map.setView([46.2, 2.2], 6); return; }

  const maxBiens = Math.max(...zones.map(z => z.nb_biens || 0), 1);
  const allLayers = [];

  Promise.all(zones.map(zone =>
    fetch(`https://geo.api.gouv.fr/communes/${zone.code_insee}?format=geojson&geometry=contour`)
      .then(r => r.json())
      .then(gj => {
        const t = (zone.nb_biens || 0) / maxBiens;
        const lyr = L.geoJSON(gj, {
          style: { fillColor: _mapColor(t), fillOpacity: 0.7, color: '#fff', weight: 2 }
        });
        lyr.bindTooltip(
          `<strong>${zone.commune}</strong> <span style="color:#718096">${zone.cp}</span><br>` +
          `${zone.nb_biens} biens · ${zone.nb_entites} entités`,
          { sticky: true, direction: 'top' }
        );
        lyr.on('click', () => selectZone(zone.cp, zone.commune));
        lyr.addTo(_map);
        allLayers.push(lyr);
      })
      .catch(() => {})
  )).then(() => {
    if (!allLayers.length) { _map.setView([45.7, 4.8], 10); return; }
    try { _map.fitBounds(L.featureGroup(allLayers).getBounds().pad(0.25)); }
    catch(_) { _map.setView([45.7, 4.8], 10); }
  });
}

function _mapColor(t) {
  const stops = [[255,247,237],[254,215,170],[251,146,60],[194,65,12]];
  const i = Math.min(t, 1) * (stops.length - 1);
  const lo = Math.floor(i), hi = Math.min(Math.ceil(i), stops.length - 1);
  const f = i - lo;
  const [r,g,b] = stops[lo].map((v,j) => Math.round(v + (stops[hi][j] - v) * f));
  return `rgb(${r},${g},${b})`;
}

function showHome() {
  currentCp = ''; currentCommune = '';
  document.querySelectorAll('.zone-item').forEach(el => el.classList.remove('active'));
  document.getElementById('zone-content').style.display = 'none';
  document.getElementById('home-view').style.display = 'block';
  const overlay = document.getElementById('run-overlay');

// ── Recherche entité + carte multi-entités ───────────────────────────────────
const ENTITE_PALETTE = [
  [[254,235,200],[237,137,54]],   // orange
  [[190,225,255],[49,130,206]],   // bleu
  [[185,250,210],[47,133,90]],    // vert
  [[230,210,255],[128,90,213]],   // violet
  [[255,200,200],[197,48,48]],    // rouge
  [[180,245,245],[49,151,149]],   // teal
  [[255,230,190],[221,107,32]],   // ambre
  [[210,210,255],[76,81,191]],    // indigo
];

function _entiteColorScale(colorIdx, t) {
  const [lo, hi] = ENTITE_PALETTE[colorIdx % ENTITE_PALETTE.length];
  const [r,g,b] = lo.map((v,j) => Math.round(v + (hi[j] - v) * Math.min(t, 1)));
  return `rgb(${r},${g},${b})`;
}

let _entiteSearchTimer = null;
let _entiteResults    = [];
let _selectedEntites  = new Map(); // nom → {entity, zones, colorIdx}
let _colorCounter     = 0;

async function onEntiteSearch(val) {
  document.getElementById('entite-search-clear').style.display = val ? 'block' : 'none';
  const box = document.getElementById('sb-entite-results');
  if (!val || val.length < 2) { _renderEntiteSearchList([]); return; }
  clearTimeout(_entiteSearchTimer);
  _entiteSearchTimer = setTimeout(async () => {
    try {
      const results = await apiFetch(`/entites/search?q=${encodeURIComponent(val)}`);
      _entiteResults = results;
      _renderEntiteSearchList(results);
    } catch(_) { box.innerHTML = ''; }
  }, 250);
}

function _renderEntiteSearchList(results) {
  const box = document.getElementById('sb-entite-results');
  if (!results.length) {
    box.innerHTML = results.length === 0 && document.getElementById('entite-search-input').value.length >= 2
      ? '<div style="color:#4a5568;padding:12px 18px;font-size:11px">Aucun résultat</div>' : '';
    return;
  }
  box.innerHTML = results.map((e, i) => {
    const sel = _selectedEntites.has(e.nom);
    const ci  = sel ? _selectedEntites.get(e.nom).colorIdx : null;
    const dot = sel ? `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;
      background:${_entiteColorScale(ci, 1)};margin-right:6px;flex-shrink:0"></span>` : '';
    return `<div class="sb-entite-item${sel ? ' active' : ''}" onclick="toggleEntite(${i})">
      <div class="e-nom" style="display:flex;align-items:center">${dot}${e.nom}</div>
      <div class="e-type">${e.type || ''}</div>
    </div>`;
  }).join('');
}

async function toggleEntite(idx) {
  const e = _entiteResults[idx];
  if (_selectedEntites.has(e.nom)) {
    _selectedEntites.delete(e.nom);
  } else {
    const colorIdx = _colorCounter++ % ENTITE_PALETTE.length;
    try {
      const data = await apiFetch(`/entite/${encodeURIComponent(e.nom)}`);
      _selectedEntites.set(e.nom, { entity: e, zones: data.zones || [], colorIdx });
    } catch(_) { return; }
  }
  _renderEntiteSearchList(_entiteResults);
  showHome();
  if (_selectedEntites.size === 0) { _initMap(); return; }
  _renderMultiEntiteMap();
}

function clearEntiteSearch() {
  _selectedEntites.clear();
  _colorCounter = 0;
  document.getElementById('entite-search-input').value = '';
  document.getElementById('sb-entite-results').innerHTML = '';
  document.getElementById('entite-search-clear').style.display = 'none';
  _initMap();
}

function _renderMultiEntiteMap() {
  const el = document.getElementById('map');
  if (!el) return;
  if (_map) { _map.remove(); _map = null; }

  _map = L.map('map', { zoomControl: true });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO', maxZoom: 16
  }).addTo(_map);

  const allLayers = [];
  const fetchTasks = [];

  for (const [nom, {zones, colorIdx}] of _selectedEntites) {
    const withInsee = zones.filter(z => z.code_insee);
    const total     = withInsee.reduce((s, z) => s + (z.nb_biens || 0), 0);
    const maxBiens  = Math.max(...withInsee.map(z => z.nb_biens || 0), 1);
    for (const zone of withInsee) {
      fetchTasks.push(
        fetch(`https://geo.api.gouv.fr/communes/${zone.code_insee}?format=geojson&geometry=contour`)
          .then(r => r.json())
          .then(gj => {
            const t   = (zone.nb_biens || 0) / maxBiens;
            const pct = total > 0 ? Math.round((zone.nb_biens / total) * 100) : 0;
            const lyr = L.geoJSON(gj, {
              style: { fillColor: _entiteColorScale(colorIdx, t), fillOpacity: 0.72,
                       color: '#fff', weight: 2 }
            });
            lyr.bindTooltip(
              `<strong>${zone.commune}</strong> <span style="color:#718096">${zone.cp}</span><br>` +
              `<span style="color:${_entiteColorScale(colorIdx,1)}">${nom}</span><br>` +
              `${zone.nb_biens} bien${zone.nb_biens > 1 ? 's' : ''} · ${pct}% portefeuille`,
              { sticky: true, direction: 'top' }
            );
            lyr.on('click', () => selectZone(zone.cp, zone.commune));
            lyr.addTo(_map);
            allLayers.push(lyr);
          }).catch(() => {})
      );
    }
  }

  Promise.all(fetchTasks).then(() => {
    if (!allLayers.length) { _map.setView([45.7, 4.8], 10); return; }
    try { _map.fitBounds(L.featureGroup(allLayers).getBounds().pad(0.25)); }
    catch(_) { _map.setView([45.7, 4.8], 10); }
  });
}

let _allZones = [];

async function loadZones() {
  try {
    _allZones = await apiFetch('/zones');
    filterZones(document.getElementById('zone-search')?.value || '');
  } catch(e) {
    document.getElementById('zones-list').innerHTML = `
      <div style="padding:14px 16px">
        <div style="color:#fc8181;font-size:11px;margin-bottom:8px">⚠ API non disponible</div>
        <div style="color:#4a5568;font-size:10px;line-height:1.5">Lance dans le terminal :<br><code style="color:#90cdf4">python3 api.py</code></div>
      </div>`;
  }
}

function filterZones(query) {
  const q = (query || '').trim().toLowerCase();
  const filtered = q
    ? _allZones.filter(z => z.cp.includes(q) || z.commune.toLowerCase().includes(q))
    : _allZones;

  const label = document.getElementById('zone-section-label');
  if (label) label.textContent = q && filtered.length !== _allZones.length
    ? `Zones (${filtered.length} / ${_allZones.length})`
    : 'Zones';

  const list = document.getElementById('zones-list');
  if (!filtered.length) {
    list.innerHTML = q
      ? `<div class="empty" style="color:#4a5568;padding:16px;font-size:11px">Aucune zone pour « ${q} »</div>`
      : '<div class="empty" style="color:#4a5568;padding:16px;font-size:11px">Aucune zone — lance un run</div>';
    return;
  }
  list.innerHTML = filtered.map(z => {
    const zid = zoneId(z.cp, z.commune);
    const active = currentCp === z.cp && currentCommune === z.commune ? ' active' : '';
    return `<div class="zone-item${active}" id="zi-${zid}" onclick="selectZone('${z.cp}','${esc(z.commune)}')">
      <div class="cp">${z.cp} <span style="font-weight:400;font-size:11px;color:#718096">${z.commune}</span></div>
      <div class="zmeta">${z.nb_annonces} ann. · ${z.nb_runs} run${z.nb_runs>1?'s':''}</div>
      ${_runStatusHtml(z.run_status)}
    </div>`;
  }).join('');
}

function zoneId(cp, commune) {
  return `${cp}-${(commune||'').replace(/[^a-zA-Z0-9]/g,'_')}`;
}

// ── Vue zone ─────────────────────────────────────────────────────────────────
async function selectZone(cp, commune) {
  currentCp = cp; currentCommune = commune;
  document.querySelectorAll('.zone-item').forEach(el => el.classList.remove('active'));
  const zi = document.getElementById('zi-'+zoneId(cp, commune));
  if (zi) zi.classList.add('active');
  document.getElementById('home-view').style.display = 'none';
  const zc = document.getElementById('zone-content');
  zc.style.display = 'block';
  zc.innerHTML = '<div class="empty" style="margin-top:120px">Chargement…</div>';
  try {
    const params = commune ? `?commune=${encodeURIComponent(commune)}` : '';
    zoneData = await apiFetch('/zone/'+cp+params);
    sortCol = 'mandats'; sortAsc = false;
    selectedEntities = new Set();
    renderZone();
  } catch(e) {
    zc.innerHTML = `<div class="api-err">Erreur chargement zone ${cp} : ${e.message}</div>`;
  }
}

function renderZone() {

  entites.sort((a,b) => {
    const va=a[colKey], vb=b[colKey];
    if (typeof va==='string') return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });
  const nbBiens = z.nb_biens || 0;
  const pctLbc  = nbBiens ? Math.round((z.nb_mandats_lbc||0)/nbBiens*100)  : 0;
  const pctSl   = nbBiens ? Math.round((z.nb_mandats_sl||0)/nbBiens*100)   : 0;

  const pctMulti= z.nb_biens   ? Math.round((z.nb_multi_mandats||0)/z.nb_biens*100)  : 0;
  const pctDpe  = z.nb_annonces? Math.round((z.nb_dpe||0)/z.nb_annonces*100)         : 0;

  const rs = z.run_status || {};

    ? (rs.err_lbc?.length ? `<span style="color:#ed8936">LBC ⚠${rs.err_lbc.length}err</span>` : `<span style="color:#718096">LBC ✓${rs.lbc_pages}p</span>`) : '';
  const rsSl  = rs.sl_pages > 0
    ? (rs.err_sl?.length  ? `<span style="color:#ed8936">SL ⚠${rs.err_sl.length}err</span>`   : `<span style="color:#718096">SL ✓${rs.sl_pages}p</span>`)   : '';

  document.getElementById('zone-content').innerHTML = `
    <div class="page-head">
      <div>
        <div class="page-title">${z.commune} <span style="font-weight:400;font-size:16px;color:#718096">${z.cp}</span></div>
        <div class="page-sub">Dernier run : ${z.last_run||'—'}${rsExtra?' · '+rsExtra:''} · ${z.nb_annonces||0} annonces actives</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="openRunModal('${z.cp}','${esc(z.commune)}')">▶ Relancer</button>
      </div>
    </div>
    <div class="content">
      <div class="cards">
        <div class="card"><div class="card-lbl">Biens uniques</div><div class="card-val">${z.nb_biens||0}</div><div class="card-sub">après déduplication</div></div>
        <div class="card"><div class="card-lbl">Mandats réels</div><div class="card-val">${totalMandats}</div><div class="card-sub"><strong>${(totalMandats/Math.max(z.nb_biens||1,1)).toFixed(2)}</strong> mandat / bien</div></div>
        <div class="card"><div class="card-lbl">Entités actives</div><div class="card-val">${z.nb_entites||0}</div><div class="card-sub">agences + particuliers</div></div>
        <div class="card"><div class="card-lbl">Biens en multimandat</div><div class="card-val">${z.nb_multi_mandats||0}</div><div class="card-sub"><strong>${pctMulti}%</strong> des biens</div></div>
        <div class="card"><div class="card-lbl">Couverture DPE</div><div class="card-val">${pctDpe}%</div><div class="card-sub">${z.nb_dpe||0} / ${z.nb_annonces||0} annonces</div></div>
      </div>
      <div class="grid2">
        <div class="panel">
          <div class="p-head"><span class="p-title">Portails</span></div>
          <div class="p-body">
            <div class="bar-row"><span class="bar-lbl">LBC seul</span><div class="bar-wrap"><div class="bar-fill c-lbc" style="width:${pctLbc}%"></div></div><span class="bar-pct">${pctLbc}%</span></div>

          </div>

async function showEntite(encodedNom) {

  try {
    const e = await apiFetch('/entite/'+encodedNom);
    const nom = decodeURIComponent(encodedNom);
    const zonesTriees = [...(e.zones||[])].sort((a,b)=>b.nb_mandats-a.nb_mandats);
    const totalMandats = zonesTriees.reduce((s,z)=>s+z.nb_mandats,0);
    const totalBiens   = zonesTriees.reduce((s,z)=>s+z.nb_biens,0);
    const initials = nom.replace(/[^A-Za-zÀ-ÿ ]/g,'').split(' ').filter(w=>w.length>1).slice(0,2).map(w=>w[0].toUpperCase()).join('')||nom.slice(0,2).toUpperCase();

          <div class="card"><div class="card-lbl">Biens uniques</div><div class="card-val">${totalBiens}</div><div class="card-sub">après déduplication</div></div>
          <div class="card"><div class="card-lbl">Zones couvertes</div><div class="card-val">${zonesTriees.length}</div><div class="card-sub">codes postaux actifs</div></div>
          <div class="card"><div class="card-lbl">Zone principale</div><div class="card-val" style="font-size:18px">${zonesTriees[0]?.commune||'—'}</div><div class="card-sub">${zonesTriees[0]?.cp||''}</div></div>

          </div>
          <table>
            <thead><tr><th style="width:40px">#</th><th>Zone</th><th>Mandats</th><th style="min-width:160px">Présence sur la zone</th><th>Biens</th><th>LBC</th><th>SeLoger</th></tr></thead>
            <tbody>
              ${zonesTriees.map((z,i)=>{
                const part = z.total_mandats_zone?Math.round(z.nb_mandats/z.total_mandats_zone*100):0;
                const col  = z.nb_lbc&&z.nb_seloger?'#38a169':z.nb_lbc?'#ed8936':'#3182ce';
                const rk   = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
                return `<tr>
                  <td><span class="rank ${rk}">${i+1}</span></td>
                  <td><span class="ent-name" onclick="selectZone('${z.cp}','${esc(z.commune)}')">${z.commune}</span> <span style="color:#a0aec0;font-size:11px">${z.cp}</span></td>
                  <td><strong>${z.nb_mandats}</strong> <span style="color:#a0aec0;font-size:11px">/ ${z.total_mandats_zone||'?'} total</span></td>
                  <td><div class="pdm-wrap"><div class="pdm-bg"><div class="pdm-fill" style="width:${part}%;background:${col}"></div></div><span class="pdm-pct" style="color:${col}">${part}%</span></div></td>
                  <td>${z.nb_biens}</td>
                  <td>${z.nb_lbc?`<span class="badge b-lbc">${z.nb_lbc}</span>`:'<span class="dimmed">—</span>'}</td>
                  <td>${z.nb_seloger?`<span class="badge b-sl">${z.nb_seloger}</span>`:'<span class="dimmed">—</span>'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
        <div class="panel">
          <div class="p-head"><span class="p-title">Annonces actives (top 20)</span></div>
          <table>
            <thead><tr><th>Titre</th><th>CP</th><th>Prix</th><th>Surface</th><th>DPE</th><th>Source</th></tr></thead>
            <tbody>
              ${(e.annonces||[]).map(a=>`<tr>
                <td>${a.titre||'—'}</td><td>${a.cp}</td>
                <td>${a.prix?fmt(a.prix)+' €':'<span class="dimmed">—</span>'}</td>
                <td>${a.surface?a.surface+'m²':'<span class="dimmed">—</span>'}</td>
                <td>${a.dpe||'<span class="dimmed">—</span>'}</td>
                <td><span class="badge ${a.source==='lbc'?'b-lbc':'b-sl'}">${a.source}</span></td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  } catch(err) {
    document.getElementById('zone-content').innerHTML =
      `<div class="api-err">Erreur chargement entité : ${err.message}</div>`;
  }
}

async function startRun() {
  let url, body;
  let cp = _runCp, commune = _runCommune;

  if (_runMode === 'new') {
    cp      = document.getElementById('r-cp').value.trim();
    commune = document.getElementById('r-commune').value.trim();
    const slCode = document.getElementById('r-slcode').value.trim();
    const lbcLoc = document.getElementById('r-lbcloc').value.trim();
    const source = document.getElementById('r-source').value;
    if (!cp || !commune) { alert('Code postal et commune requis'); return; }
    url  = `${API}/run`;
    body = { cp, commune,
      ...(slCode?{sl_code:slCode}:{}),
      ...(lbcLoc?{lbc_loc:lbcLoc}:{}),
      ...(source?{source}:{}) };
  } else {
    const lbcPages = [..._selLbc].sort((a,b)=>a-b);
    const slPages  = [..._selSl].sort((a,b)=>a-b);
    if (!lbcPages.length && !slPages.length) { alert('Sélectionne au moins une page à scraper'); return; }
    const wait = document.getElementById('run-wait').value;
    url  = `${API}/retry/${cp}?wait=${wait}`;
    body = { commune, lbc_pages: lbcPages, sl_pages: slPages };
  }

  localStorage.setItem('active_run', JSON.stringify({cp, commune, mode: _runMode, startedAt: Date.now()}));

  document.getElementById('run-new-form').style.display      = 'none';
  document.getElementById('run-existing-form').style.display = 'none';
  document.getElementById('run-log').style.display  = 'block';
  document.getElementById('run-minimize-btn').style.display  = 'inline';
  document.getElementById('run-accept-btn').style.display    = 'none';
  const btn = document.getElementById('run-action-btn');
  btn.textContent = 'En cours…'; btn.disabled = true;

  const log = document.getElementById('log-content');
  const add = (line) => {
    const d = document.createElement('div');
    d.className = line.includes('✓')||line.includes('OK')||line.includes('Terminé')?'l-ok'
      :line.includes('✗')||line.includes('ERR')||line.includes('ECHEC')?'l-err'
      :line.includes('⚠')||line.includes('WARN')?'l-warn':'';
    d.textContent = line; log.appendChild(d); log.scrollTop = log.scrollHeight;
  };

  try {
    const resp = await fetch(url, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const reader = resp.body.getReader(), decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buf += decoder.decode(value, {stream: true});
      const lines = buf.split('\n'); buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = JSON.parse(line.slice(6));
        if (payload === '__DONE__') {
          add('✓ Pipeline terminé');
          _miniDone(true);
          btn.textContent = 'Voir les résultats'; btn.disabled = false;
          btn.onclick = () => { closeMini(); closeRunModal(); selectZone(cp, commune); loadZones(); loadAlerts(); };
          return;
        }
        add(payload);
      }
    }
  } catch(e) {
    add('✗ Erreur connexion API : ' + e.message);
    add('  Vérifiez que python3 api.py est lancé.');
    _miniDone(false);
    btn.textContent = 'Fermer'; btn.disabled = false; btn.onclick = closeRunModal;
  }
}

// ── Sélection entités ────────────────────────────────────────────────────────
function toggleEntity(cb) {
  const nom = cb.dataset.nom;
  if (cb.checked) selectedEntities.add(nom);
  else selectedEntities.delete(nom);
  _syncCbAll();
  updateSelectionPanel();
}

function toggleAllEntities(checked) {
  const z = zoneData;
  if (!z) return;
  (z.entites || []).forEach(e => {
    if (checked) selectedEntities.add(e.nom);
    else selectedEntities.delete(e.nom);
  });
  document.querySelectorAll('.ent-cb:not(#cb-all)').forEach(cb => cb.checked = checked);
  updateSelectionPanel();
}

function clearSelection() {
  selectedEntities.clear();
  document.querySelectorAll('.ent-cb').forEach(cb => cb.checked = false);
  updateSelectionPanel();
}

function _syncCbAll() {
  const all  = document.querySelectorAll('.ent-cb:not(#cb-all)');
  const chk  = document.querySelectorAll('.ent-cb:not(#cb-all):checked');
  const cbAll = document.getElementById('cb-all');
  if (!cbAll) return;
  cbAll.checked       = chk.length === all.length && all.length > 0;
  cbAll.indeterminate = chk.length > 0 && chk.length < all.length;
}

function removeFromSel(nom) {
  selectedEntities.delete(nom);
  document.querySelectorAll('.ent-cb:not(#cb-all)').forEach(cb => {
    if (cb.dataset.nom === nom) cb.checked = false;
  });
  _syncCbAll();
  updateSelectionPanel();
}

function updateSelectionPanel() {
  const z = zoneData;
  if (!z) return;
  const panel = document.getElementById('sel-panel');
  const body  = document.getElementById('sel-body');
  if (!panel || !body) return;

  if (selectedEntities.size === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';

  const entites      = z.entites || [];
  const totalMandats = z.nb_mandats || 0;
  const totalBiens   = z.nb_biens   || 0;

  const selList     = entites.filter(e => selectedEntities.has(e.nom));
  const selMandats  = selList.reduce((s, e) => s + e.nb_mandats, 0);
  const selBiens    = selList.reduce((s, e) => s + e.nb_biens,   0);
  const othMandats  = totalMandats - selMandats;
  const othBiens    = totalBiens   - selBiens;
  const othCount    = entites.length - selectedEntities.size;

  const selPct = totalMandats ? Math.round(selMandats / totalMandats * 100) : 0;
  const othPct = 100 - selPct;

  const tags = [...selectedEntities].map(nom =>
    `<span class="sel-tag">${htmlEsc(nom)}<span class="sel-tag-x" onclick="removeFromSel(${JSON.stringify(nom)})">×</span></span>`
  ).join('');

  body.innerHTML = `
    <div style="margin-bottom:14px;line-height:2">${tags}</div>
    <div class="bar-row">
      <span class="bar-lbl" style="width:160px;font-weight:600;color:#553c9a">Sélection (${selectedEntities.size})</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${selPct}%;background:#805ad5"></div></div>
      <span class="bar-pct" style="width:42px;color:#805ad5">${selPct}%</span>
      <span style="font-size:11px;color:#718096">${selMandats} mandat${selMandats>1?'s':''} · ${selBiens} bien${selBiens>1?'s':''} uniq.</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl" style="width:160px;color:#718096">Autres (${othCount})</span>
      <div class="bar-wrap"><div class="bar-fill" style="width:${othPct}%;background:#cbd5e0"></div></div>
      <span class="bar-pct" style="width:42px;color:#a0aec0">${othPct}%</span>
      <span style="font-size:11px;color:#a0aec0">${othMandats} mandat${othMandats>1?'s':''} · ${othBiens} bien${othBiens>1?'s':''} uniq.</span>
    </div>`;
}

// ── Utils ────────────────────────────────────────────────────────────────────
async function apiFetch(path) {
  const r = await fetch(API+path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}
function fmt(n)     { return n?.toLocaleString('fr-FR')?? '—'; }
function esc(s)     { return (s||'').replace(/'/g,"\\'"); }
function htmlEsc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Restauration run actif après rechargement ────────────────────────────────
let _pollTimer = null;

function _showRunIndicator(cp, commune) {
  _runCp = cp; _runCommune = commune;
  const label = `${commune} ${cp}`;
  const sb = document.getElementById('sb-running');
  sb.className = 'sb-run-indicator running';
  sb.style.display = 'flex';
  document.getElementById('sb-dot').className = 'mini-dot running';
  document.getElementById('sb-running-text').textContent = `Run en cours — ${label}`;
  _miniTarget = 'run';
  _miniRunning = true;
  // Snapshot minimal pour restoreFromMini (run détecté au reload, pas de log disponible)
  if (!_miniSnapshot) {
    _miniSnapshot = { logHtml: `<div style="color:#a0aec0;font-size:12px;padding:8px">Run détecté en cours — log non disponible (run lancé hors dashboard)</div>`, title: `▶ Run en cours — ${label}`, cp, commune };
  }
  // Restaurer la mini-bar (tab en bas) — perdue au rechargement
  document.getElementById('mini-title').textContent  = `Run — ${label}`;
  document.getElementById('mini-status').innerHTML   = '<span class="mini-dot running" id="mini-dot"></span>En cours…';
  document.getElementById('mini-bar').style.display  = 'block';
  document.getElementById('mini-close-btn').style.display = 'none';
}

function _startRunPoller(cp) {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(async () => {
    try {
      const runs = await apiFetch('/runs');
      const latest = runs.find(r => r.cp === cp);
      if (!latest || latest.statut === 'running') return;
      // Ne pas s'arrêter sur un ancien run antérieur à notre démarrage
      const saved = localStorage.getItem('active_run');
      let t0 = 0;
      try { t0 = JSON.parse(saved || '{}').startedAt || 0; } catch(_) {}
      const latestTs = new Date(latest.date.replace(' ', 'T') + 'Z').getTime();
      if (t0 && latestTs < t0) return; // scraping encore en cours, pas de ligne DB pour notre run
      clearInterval(_pollTimer); _pollTimer = null;
      _miniDone(latest.statut === 'ok');
      loadZones(); loadAlerts();
    } catch(_) {}
  }, 3000);
}

async function checkActiveRun() {
  try {
    const runs = await apiFetch('/runs');
    // 1. Run 'running' détecté en DB (lancé depuis terminal ou phase transform)
    const activeDb = runs.find(r => r.statut === 'running');
    if (activeDb) {
      localStorage.setItem('active_run', JSON.stringify({cp: activeDb.cp, commune: activeDb.commune, startedAt: Date.now()}));
      _showRunIndicator(activeDb.cp, activeDb.commune);
      await _startLogOrRunPoller(activeDb.cp);
      return;
    }
    // 2. Fallback localStorage — run en phase scraping (pas encore de ligne dans runs)
    const saved = localStorage.getItem('active_run');
    if (saved) {
      try {
        const {cp, commune, startedAt} = JSON.parse(saved);
        if (cp && commune) {
          const latestForCp = runs.find(r => r.cp === cp);
          const latestTs = latestForCp ? new Date(latestForCp.date.replace(' ', 'T') + 'Z').getTime() : 0;
          const t0 = startedAt || (Date.now() - 7200000);
          if (!latestForCp || latestTs < t0) {
            _showRunIndicator(cp, commune);
            await _startLogOrRunPoller(cp);
            return;
          }
        }
      } catch(_) {}
    }
    localStorage.removeItem('active_run');
  } catch(_) {}
}

loadZones();
loadAlerts();
loadSbRuns();
loadMap();
checkActiveRun();
